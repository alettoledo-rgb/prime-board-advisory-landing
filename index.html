<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PBA, em construção</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="icon" href="assets/img/pba.png" />
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: #020617;
        color: #e2e8f0;
      }
      .wrap {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        width: min(720px, 100%);
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 16px;
        padding: 28px;
        text-align: center;
        backdrop-filter: blur(8px);
      }
      .logo {
        width: 120px;
        height: auto;
        margin: 0 auto 18px;
        display: block;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 32px;
        letter-spacing: -0.02em;
      }
      p {
        margin: 0 auto 18px;
        max-width: 54ch;
        color: #94a3b8;
        line-height: 1.55;
        font-size: 16px;
      }
      .bar {
        height: 4px;
        width: 84px;
        margin: 18px auto 0;
        border-radius: 999px;
        background: linear-gradient(90deg, #3b82f6, #60a5fa);
      }
      .small {
        margin-top: 14px;
        font-size: 13px;
        color: #64748b;
      }
      a {
        color: #93c5fd;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>

  <body>
    <main class="wrap">
      <section class="card">
        <img class="logo" src="assets/img/logo-white.png" alt="Prime Board Advisory" />

        <h1>Página em construção</h1>

        <p>
          Estamos estruturando a próxima versão desta página com mais clareza de proposta,
          posicionamento e entrega. Em breve, novidades.
        </p>

        <div class="bar"></div>

        <div class="small">
          Se precisar falar conosco, use o canal oficial do projeto.
        </div>
      </section>
    </main>
  </body>
</html>
